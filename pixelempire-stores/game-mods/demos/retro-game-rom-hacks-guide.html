<!DOCTYPE html>

<style>

    body { background:#0a0a0f; color:#e0e0e0; font-family:'Inter', system-ui, sans-serif; line-height:1.6; }

    .container { max-width:960px; margin:0 auto; padding:24px 16px; }

.crypto-pay-btn:hover{opacity:0.9;transform:translateY(-2px)}

</head>
<body>
<div class="container">

<h1 style="font-size:16px;margin-bottom:8px;color:#10b981">ROM Hacking Starter Guide</h1>
<p class="muted" style="margin-bottom:12px">Learn ROM hacking from scratch. Tools, hex editing, sprite editing, level design. Create mods for classic games. Legal guide included.</p>
<div id="page" class="card" style="min-height:320px;padding:24px;margin-bottom:12px"></div>
<div style="display:flex;gap:12px;align-items:center;margin-bottom:16px">

<div style="display:flex;gap:12px;align-items:center">

</div>

</div>
<script>
(function(){
  var accent='#10b981';
  var pages=[
    '<h2 style="font-size:13px;color:'+accent+';margin-bottom:16px">Daily Plan</h2>'
    +'<div style="margin-bottom:8px"><input type="checkbox"> <span style="color:#ccc">Morning review</span></div>'
    +'<div style="margin-bottom:8px"><input type="checkbox"> <span style="color:#ccc">Focus session 1</span></div>'

    +'<div style="height:60px;border:1px dashed #444;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#555">Notes area</div>',

    '<h2 style="font-size:13px;color:'+accent+';margin-bottom:16px">Weekly Overview</h2>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">'
    +'<div style="text-align:center;font-size:10px;color:#888">Mon</div>'
    +'<div style="text-align:center;font-size:10px;color:#888">Tue</div>'
    +'<div style="text-align:center;font-size:10px;color:#888">Wed</div>'
    +'<div style="text-align:center;font-size:10px;color:#888">Thu</div>'
    +'<div style="text-align:center;font-size:10px;color:#888">Fri</div>'
    +'<div style="text-align:center;font-size:10px;color:#888">Sat</div>'
    +'<div style="text-align:center;font-size:10px;color:#888">Sun</div>'
    +'</div>'
    +'<div style="margin-top:16px"><div style="height:30px;background:#1a1a2e;border-radius:4px;margin-bottom:6px"></div>'
    +'<div style="height:30px;background:#1a1a2e;border-radius:4px;margin-bottom:6px"></div>'
    +'<div style="height:30px;background:#1a1a2e;border-radius:4px"></div></div>',

    '<h2 style="font-size:13px;color:'+accent+';margin-bottom:16px">Goals &amp; Tracker</h2>'
    +'<div style="margin-bottom:12px"><span style="color:#aaa;font-size:12px">Progress</span>'
    +'<div style="height:10px;background:#1a1a2e;border-radius:5px;overflow:hidden;margin-top:4px">'
    +'<div style="width:65%;height:100%;background:'+accent+'"></div></div></div>'
    +'<div style="margin-bottom:8px"><input type="checkbox" checked> <span style="color:#ccc">Goal 1 complete</span></div>'
    +'<div style="margin-bottom:8px"><input type="checkbox"> <span style="color:#ccc">Goal 2 in progress</span></div>'
    +'<div><input type="checkbox"> <span style="color:#ccc">Goal 3 not started</span></div>'
  ];
  var cur=0;
  function show(){
    document.getElementById('page').innerHTML=pages[cur];
    document.getElementById('pageNum').textContent='Page '+(cur+1)+' / '+pages.length;
  }
  show();
  document.getElementById('prevBtn').onclick=function(){ cur=(cur-1+pages.length)%pages.length; show(); };
  document.getElementById('nextBtn').onclick=function(){ cur=(cur+1)%pages.length; show(); };
})();
</script>
<script src="../crypto-checkout.js"></script>
