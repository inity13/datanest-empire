<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aesthetic App Icon Pack | Pixel Empire Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0f; color:#e0e0e0; font-family:'Inter', system-ui, sans-serif; line-height:1.6; }
    h1,h2,h3 { font-family:'Press Start 2P', 'Inter', system-ui, sans-serif; letter-spacing:1px; }
    a { color:#f97316; text-decoration:none; }
    a:hover { text-decoration:underline; }
    .container { max-width:960px; margin:0 auto; padding:24px 16px; }
    .btn { display:inline-block; padding:12px 28px; background:#f97316; color:#000;
            font-weight:700; border:none; border-radius:6px; cursor:pointer; font-size:14px; }
    .btn:hover { opacity:0.85; text-decoration:none; }
    .price { font-size:22px; font-weight:700; color:#f97316; }
    .muted { color:#888; font-size:13px; }
    .card { background:#14141f; border-radius:10px; padding:16px; }
    canvas { display:block; border-radius:8px; image-rendering:pixelated; }
    .crypto-pay-btn{display:inline-block;background:linear-gradient(135deg,#f7931a,#627eea);color:#fff;padding:12px 26px;border-radius:8px;font-weight:700;border:none;cursor:pointer;font-size:.9rem;margin-top:8px;transition:all .2s}
.crypto-pay-btn:hover{opacity:0.9;transform:translateY(-2px)}
    </style>
</head>
<body>
<div class="container">

<h1 style="font-size:16px;margin-bottom:8px;color:#f97316">Aesthetic App Icon Pack</h1>
<p class="muted" style="margin-bottom:12px">200+ custom app icons for iOS/Android. Pastel, dark, neon, minimal themes. Covers all major apps.</p>
<div style="position:relative;width:100%;height:300px;background:#14141f;border-radius:10px;margin-bottom:12px;overflow:hidden">

<div class="overlay-layer" id="layer0"
  style="position:absolute;top:10px;left:10px;right:10px;bottom:10px;
         background:rgb(158,110,123);opacity:0.35;border-radius:8px;transition:opacity 0.3s"></div>
<div class="overlay-layer" id="layer1"
  style="position:absolute;top:25px;left:25px;right:25px;bottom:25px;
         background:rgb(225,240,192);opacity:0.35;border-radius:8px;transition:opacity 0.3s"></div>
<div class="overlay-layer" id="layer2"
  style="position:absolute;top:40px;left:40px;right:40px;bottom:40px;
         background:rgb(158,110,123);opacity:0.35;border-radius:8px;transition:opacity 0.3s"></div>
<div class="overlay-layer" id="layer3"
  style="position:absolute;top:55px;left:55px;right:55px;bottom:55px;
         background:rgb(225,240,192);opacity:0.35;border-radius:8px;transition:opacity 0.3s"></div>
</div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px"><button class="btn" style="font-size:11px;padding:8px 14px" onclick="toggleLayer(0)">Layer 1</button><button class="btn" style="font-size:11px;padding:8px 14px" onclick="toggleLayer(1)">Layer 2</button><button class="btn" style="font-size:11px;padding:8px 14px" onclick="toggleLayer(2)">Layer 3</button><button class="btn" style="font-size:11px;padding:8px 14px" onclick="toggleLayer(3)">Layer 4</button></div>
<div style="display:flex;gap:12px;align-items:center">
  <span class="price">$3.99</span>
  <a href="https://buy.stripe.com/dRm4gz5eDddcfVM9CpgjI1Q" class="btn" target="_blank" rel="noopener">Buy Now</a>
<button class="crypto-pay-btn" data-product-slug="app-icon-pack-aesthetic" data-store-slug="wallpaper-widgets" data-product-name="Aesthetic App Icon Pack" data-price-usd="3.99">Pay with Crypto (Save 15%)</button>

</div>

</div>
<script>
function toggleLayer(i){
  var el=document.getElementById('layer'+i);
  el.style.opacity=parseFloat(el.style.opacity)>0.1?'0':'0.35';
}
</script>
<script src="../crypto-checkout.js"></script>
</body>
</html>
