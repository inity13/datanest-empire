.tag {
  display: inline-block;
  font-family: var(--cv-font-mono); font-size: 0.7rem;
  background: rgba(var(--cv-accent-rgb),0.08);
  color: var(--cv-accent);
  border: 1px solid rgba(var(--cv-accent-rgb),0.2);
  padding: 0.15rem 0.5rem; border-radius: 4px;
  margin-right: 0.25rem; margin-bottom: 0.25rem;
}

/* ---------- loading skeleton ---------- */
@keyframes cv-shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--cv-card), var(--cv-surface), var(--cv-card));
  background-size: 200% 100%;
  animation: cv-shimmer 1.5s ease-in-out infinite;
  border-radius: var(--cv-radius);
}

/* ---------- tooltip ---------- */
.cv-tooltip {
  position: relative;
}
.cv-tooltip::after {
  content: attr(data-tip);
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%) translateY(-4px);
  background: var(--cv-surface); color: var(--cv-text);
  font-family: var(--cv-font-mono); font-size: 0.75rem;
  padding: 0.35rem 0.6rem; border-radius: 4px;
  border: 1px solid var(--cv-border);
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.cv-tooltip:hover::after { opacity: 1; }

/* ---------- code block ---------- */
.code-block {
  background: var(--cv-card);
  border: 1px solid var(--cv-border);
  border-radius: var(--cv-radius);
  padding: 1rem 1.25rem;
  font-family: var(--cv-font-mono); font-size: 0.85rem;
  color: var(--cv-text); overflow-x: auto;
  position: relative;
}
.code-block::before {
  content: attr(data-lang);
  position: absolute; top: 0.5rem; right: 0.75rem;
  font-size: 0.65rem; color: var(--cv-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
}

/* ---------- notification / toast ---------- */
.cv-toast {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  background: var(--cv-surface); color: var(--cv-text);
  border: 1px solid var(--cv-accent);
  border-radius: var(--cv-radius);
  padding: 0.75rem 1.25rem;
  font-family: var(--cv-font-mono); font-size: 0.85rem;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 2000;
  transform: translateY(120%);
  transition: transform 0.3s ease;
}
.cv-toast.visible { transform: translateY(0); }

/* ---------- counter / stat box ---------- */
.stat-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 1rem; margin: 2rem 0;
}
.stat-box {
  background: var(--cv-card); border: 1px solid var(--cv-border);
  border-radius: var(--cv-radius);
  padding: 1.25rem; text-align: center;
}
.stat-number {
  font-family: var(--cv-font-mono); font-size: 2rem; font-weight: 700;
  color: var(--cv-accent);
}
.stat-label {
  font-size: 0.8rem; color: var(--cv-muted); margin-top: 0.25rem;
}

/* ---------- divider ---------- */
.cv-divider {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cv-border), transparent);
  margin: 3rem 0;
}

/* ---------- skip link & sr-only ---------- */
.skip-link {
  position: absolute; top: -100%;
  left: 0; padding: 0.75rem 1.5rem;
  background: var(--cv-accent); color: #000;
  font-family: var(--cv-font-mono); font-weight: 600;
  z-index: 9999; text-decoration: none;
  border-radius: 0 0 var(--cv-radius) 0;
}
.skip-link:focus-visible {
  top: 0;
}
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0);
  white-space: nowrap; border: 0;
}

/* ---------- focus-visible ---------- */
a:focus-visible,
button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--cv-accent);
  outline-offset: 2px;
}

/* ---------- prefers-reduced-motion ---------- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  .reveal { opacity: 1; transform: none; }
  .cv-badge { animation: none; }
  body::after { display: none; }
}

/* ---------- responsive ---------- */
@media (max-width: 1024px) {
  .features-grid { grid-template-columns: repeat(2, 1fr); }
  .footer-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {

  .hero h1 { font-size: 1.8rem; }
  .products-grid { grid-template-columns: 1fr; }
  .bundle-card { padding: 1.5rem; }
}

@media (max-width: 640px) {
