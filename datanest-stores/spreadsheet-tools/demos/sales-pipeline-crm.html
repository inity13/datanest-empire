<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sales Pipeline & CRM | Digital Stores Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0f1117;color:#e2e8f0;font-family:'Inter', 'SF Pro', system-ui, sans-serif;line-height:1.6}
    a{color:#3b82f6;text-decoration:none} a:hover{text-decoration:underline}
    .container{max-width:1000px;margin:0 auto;padding:24px 16px}
    .btn{display:inline-block;padding:10px 24px;background:#3b82f6;color:#fff;
          font-weight:600;border:none;border-radius:6px;cursor:pointer;font-size:14px}
    .btn:hover{opacity:0.85;text-decoration:none}
    .price{font-size:20px;font-weight:700;color:#3b82f6}
    .muted{color:#94a3b8;font-size:13px}
    .card{background:#1a1d27;border-radius:8px;padding:16px;border:1px solid #2a2d37}
    .tag{display:inline-block;padding:2px 8px;background:#3b82f622;color:#3b82f6;
         border-radius:4px;font-size:11px;font-weight:600}
    code,.mono{font-family:'JetBrains Mono',monospace}
    </style>
<style>.crypto-pay-btn{display:inline-block;background:linear-gradient(135deg,#f7931a,#627eea);color:#fff;padding:12px 26px;border-radius:8px;font-weight:700;border:none;cursor:pointer;font-size:.9rem;margin-top:8px;transition:all .2s}.crypto-pay-btn:hover{opacity:0.9;transform:translateY(-2px)}</style>
</head>
<body>
<div class="container">

<h1 style="font-size:18px;margin-bottom:4px">Sales Pipeline & CRM</h1>
<p class="muted" style="margin-bottom:16px">Lead tracking, deal stages, revenue forecasting, and sales performance dashboard with automated pipeline views.</p>
<div style="display:grid;grid-template-columns:240px 1fr;gap:16px;margin-bottom:20px">
<div class="card" style="padding:20px">
  <h3 style="font-size:13px;margin-bottom:12px;color:#3b82f6">Template Options</h3>
  <div style="margin-bottom:12px">
    <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:4px">Style</label>
    <label style="display:block;font-size:13px;margin-bottom:4px;cursor:pointer"><input type="radio" name="style" checked onchange="updatePreview()"> Professional</label>
    <label style="display:block;font-size:13px;margin-bottom:4px;cursor:pointer"><input type="radio" name="style" onchange="updatePreview()"> Minimal</label>
    <label style="display:block;font-size:13px;cursor:pointer"><input type="radio" name="style" onchange="updatePreview()"> Creative</label>
  </div>
  <div style="margin-bottom:12px">
    <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:4px">Features</label>
    <label style="display:block;font-size:13px;margin-bottom:4px;cursor:pointer"><input type="checkbox" checked onchange="updatePreview()"> Header section</label>
    <label style="display:block;font-size:13px;margin-bottom:4px;cursor:pointer"><input type="checkbox" checked onchange="updatePreview()"> Analytics</label>
    <label style="display:block;font-size:13px;cursor:pointer"><input type="checkbox" onchange="updatePreview()"> Dark mode</label>
  </div>
  <div>
    <label style="font-size:12px;color:#94a3b8;display:block;margin-bottom:4px">Accent Color</label>
    <div style="display:flex;gap:6px">
      <div style="width:24px;height:24px;border-radius:50%;background:#3b82f6;cursor:pointer;border:2px solid #fff" onclick="setAccent('#3b82f6')"></div>
      <div style="width:24px;height:24px;border-radius:50%;background:#22c55e;cursor:pointer;border:2px solid transparent" onclick="setAccent('#22c55e')"></div>
      <div style="width:24px;height:24px;border-radius:50%;background:#a855f7;cursor:pointer;border:2px solid transparent" onclick="setAccent('#a855f7')"></div>
    </div>
  </div>
</div>
<div id="preview" class="card" style="padding:24px;min-height:320px">
  <div id="previewHeader" style="border-bottom:2px solid #3b82f6;padding-bottom:12px;margin-bottom:16px">
    <h2 style="font-size:16px" id="prevTitle">Sales Pipeline & CRM</h2>
    <p style="font-size:12px;color:#94a3b8">Preview Document — v240.218</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
    <div><label style="font-size:11px;color:#94a3b8">Name</label><div style="padding:8px;background:#0f1117;border-radius:4px;font-size:13px">John Doe</div></div>
    <div><label style="font-size:11px;color:#94a3b8">Company</label><div style="padding:8px;background:#0f1117;border-radius:4px;font-size:13px">AcmeCorp</div></div>
    <div><label style="font-size:11px;color:#94a3b8">Date</label><div style="padding:8px;background:#0f1117;border-radius:4px;font-size:13px">2026-03-16</div></div>
    <div><label style="font-size:11px;color:#94a3b8">Version</label><div style="padding:8px;background:#0f1117;border-radius:4px;font-size:13px">1.0.219</div></div>
  </div>
  <div style="height:60px;border:1px dashed #3a3d47;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:12px">Content area — editable in full version</div>
</div>
</div>
<div style="display:flex;gap:12px;align-items:center">
<span class="price">$29.00</span>
<a href="https://buy.stripe.com/00w14n9uTa10gZQeWJgjH3a" class="btn">Buy Now</a>
<button class="crypto-pay-btn" data-product-slug="sales-pipeline-crm" data-store-slug="spreadsheet-tools" data-product-name="Sales Pipeline & CRM" data-price-usd="29">Pay with Crypto (Save 20%)</button>
</div>

</div>
<script>
function updatePreview(){
  var el=document.getElementById('preview');
  el.style.opacity='0.7';
  setTimeout(function(){ el.style.opacity='1'; },200);
}
function setAccent(c){
  document.getElementById('previewHeader').style.borderBottomColor=c;
}
</script>
<script src="../crypto-checkout.js"></script>
</body>
</html>
