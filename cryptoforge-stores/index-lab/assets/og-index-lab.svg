<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#080812"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,107,0,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="rgba(255,107,0,0.06)"/>

  <!-- Badge -->
  <rect x="465" y="140" width="270" height="32" rx="16" fill="none" stroke="#FF6B00" stroke-width="1.5"/>
  <text x="600" y="161" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" letter-spacing="3" fill="#FF6B00">CRYPTOFORGE STORE #9</text>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="56" font-weight="800" fill="#E0E0E0">Index Lab</text>

  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="'Inter', sans-serif" font-size="20" fill="#8888aa">Tokenized Index &amp; Portfolio Tools</text>

  <!-- Stats row -->
  <text x="300" y="370" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="700" fill="url(#accent)">8</text>
  <text x="300" y="395" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#555577" letter-spacing="2">PRODUCTS</text>

  <text x="500" y="370" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="700" fill="url(#accent)">4</text>
  <text x="500" y="395" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#555577" letter-spacing="2">CONTRACTS</text>

  <text x="700" y="370" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="700" fill="url(#accent)">2</text>
  <text x="700" y="395" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#555577" letter-spacing="2">DASHBOARDS</text>

  <text x="900" y="370" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="36" font-weight="700" fill="url(#accent)">2</text>
  <text x="900" y="395" text-anchor="middle" font-family="'Inter', sans-serif" font-size="12" fill="#555577" letter-spacing="2">PYTHON TOOLS</text>

  <!-- Divider -->
  <line x1="200" y1="440" x2="1000" y2="440" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Tech tags -->
  <rect x="310" y="470" width="100" height="28" rx="4" fill="rgba(255,107,0,0.15)"/>
  <text x="360" y="489" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#FF6B00">Solidity</text>

  <rect x="430" y="470" width="130" height="28" rx="4" fill="rgba(0,230,118,0.15)"/>
  <text x="495" y="489" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#00E676">React / TS</text>

  <rect x="580" y="470" width="90" height="28" rx="4" fill="rgba(0,212,255,0.15)"/>
  <text x="625" y="489" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#00d4ff">Python</text>

  <rect x="690" y="470" width="110" height="28" rx="4" fill="rgba(255,215,0,0.15)"/>
  <text x="745" y="489" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="700" fill="#FFD700">Foundry</text>

  <!-- Bottom brand -->
  <text x="600" y="570" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#555577">cryptoforge.io</text>
</svg>
