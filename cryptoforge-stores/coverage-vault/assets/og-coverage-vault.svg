<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#1A1A2E" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

  <!-- Shield / Insurance icon -->
  <g transform="translate(520, 100)">
    <!-- Shield body -->
    <path d="M 80 20 L 145 50 L 145 120 Q 145 170 80 200 Q 15 170 15 120 L 15 50 Z"
          fill="none" stroke="url(#accent)" stroke-width="3"/>
    <!-- Inner shield -->
    <path d="M 80 45 L 125 65 L 125 115 Q 125 150 80 172 Q 35 150 35 115 L 35 65 Z"
          fill="#FF6B00" opacity="0.12"/>
    <!-- Plus / cross (medical/coverage symbol) -->
    <rect x="68" y="80" width="24" height="70" rx="4" fill="#FF6B00" opacity="0.9"/>
    <rect x="48" y="103" width="64" height="24" rx="4" fill="#FF6B00" opacity="0.9"/>
    <!-- Shield highlight dots -->
    <circle cx="45" cy="70" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="115" cy="70" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="45" cy="155" r="3" fill="#FFD700" opacity="0.6"/>
    <circle cx="115" cy="155" r="3" fill="#FFD700" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="600" y="360" text-anchor="middle" fill="#E0E0E0" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="52" font-weight="700">COVERAGE VAULT</text>

  <!-- Subtitle -->
  <text x="600" y="410" text-anchor="middle" fill="#FF6B00" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="20" font-weight="400">DeFi Insurance &amp; Risk Tools</text>

  <!-- Tags -->
  <text x="600" y="460" text-anchor="middle" fill="#888899" font-family="'Inter', 'Helvetica', sans-serif" font-size="16">10 Products &bull; Solidity ^0.8.24 &bull; Python &bull; React/TypeScript</text>

  <!-- Brand bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>

  <!-- CryptoForge logo text -->
  <text x="600" y="520" text-anchor="middle" fill="#555566" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="4">CRYPTOFORGE</text>

  <!-- Decorative corners -->
  <path d="M 20 20 L 20 60 M 20 20 L 60 20" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 1180 20 L 1180 60 M 1180 20 L 1140 20" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 20 600 L 20 560 M 20 600 L 60 600" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 1180 600 L 1180 560 M 1180 600 L 1140 600" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
