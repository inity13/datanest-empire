<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>
    <linearGradient id="forge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.05" stroke="#FF6B00" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>
  <!-- ZK proof icon -->
  <g transform="translate(600, 250)" fill="none" stroke="url(#forge)" stroke-width="3">
    <circle r="60" opacity="0.4"/>
    <circle r="40" opacity="0.6"/>
    <circle r="20" opacity="0.8"/>
    <line x1="-30" y1="-30" x2="30" y2="30" opacity="0.5"/>
    <line x1="30" y1="-30" x2="-30" y2="30" opacity="0.5"/>
  </g>
  <!-- Store badge -->
  <rect x="480" y="100" width="240" height="32" rx="16" fill="none" stroke="#FF6B00" stroke-width="1.5"/>
  <text x="600" y="122" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="13" font-weight="600">CRYPTOFORGE STORE #10</text>
  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" fill="url(#forge)" font-family="monospace" font-size="48" font-weight="800">PROVER MARKET</text>
  <!-- Subtitle -->
  <text x="600" y="440" text-anchor="middle" fill="#8888aa" font-family="sans-serif" font-size="18">ZK Prover &amp; Compute Tools</text>
  <!-- Stats -->
  <text x="420" y="520" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="24" font-weight="700">8</text>
  <text x="420" y="545" text-anchor="middle" fill="#555577" font-family="sans-serif" font-size="12">PRODUCTS</text>
  <text x="600" y="520" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="24" font-weight="700">2</text>
  <text x="600" y="545" text-anchor="middle" fill="#555577" font-family="sans-serif" font-size="12">BUNDLES</text>
  <text x="780" y="520" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="24" font-weight="700">$7.99</text>
  <text x="780" y="545" text-anchor="middle" fill="#555577" font-family="sans-serif" font-size="12">FROM</text>
  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="8" fill="none" stroke="#2a2a3a" stroke-width="2"/>
</svg>
