    <text x="-240" y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#8888A0">Solidity</text>

    <rect x="-180" y="-14" width="100" height="28" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <text x="-130" y="4" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#8888A0">TypeScript</text>

