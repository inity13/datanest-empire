    <text x="16" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#000">CF</text>
    <text x="44" y="22" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#E8E8F0">CryptoForge</text>
