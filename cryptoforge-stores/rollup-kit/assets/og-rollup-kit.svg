<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g stroke="#1A1A2E" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
  </g>

  <!-- Rollup icon: stacked L2 blocks with arrow to L1 -->
  <g transform="translate(500, 80)">
    <!-- L2 Block 3 (top, smallest) -->
    <rect x="40" y="0" width="120" height="40" rx="6" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
    <text x="100" y="26" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="14" opacity="0.5">L2</text>

    <!-- L2 Block 2 (middle) -->
    <rect x="20" y="48" width="160" height="40" rx="6" fill="none" stroke="#FF6B00" stroke-width="2" opacity="0.7"/>
    <text x="100" y="74" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="14" opacity="0.7">L2</text>

    <!-- L2 Block 1 (bottom, largest) -->
    <rect x="0" y="96" width="200" height="40" rx="6" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="100" y="122" text-anchor="middle" fill="#FF6B00" font-family="monospace" font-size="14">BATCH</text>

    <!-- Arrow pointing down to L1 -->
    <line x1="100" y1="144" x2="100" y2="185" stroke="#FF6B00" stroke-width="2.5" stroke-dasharray="4 3"/>
    <polygon points="88,180 100,198 112,180" fill="#FF6B00"/>

    <!-- L1 bar -->
    <rect x="-10" y="204" width="220" height="8" rx="4" fill="url(#accent)" opacity="0.8"/>
    <text x="100" y="232" text-anchor="middle" fill="#555566" font-family="monospace" font-size="12">L1 ETHEREUM</text>
  </g>

  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" fill="#E0E0E0" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="52" font-weight="700">ROLLUP KIT</text>

  <!-- Subtitle -->
  <text x="600" y="390" text-anchor="middle" fill="#FF6B00" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="20" font-weight="400">L2 &amp; Rollup Infrastructure Tools</text>

  <!-- Tags -->
  <text x="600" y="440" text-anchor="middle" fill="#888899" font-family="'Inter', 'Helvetica', sans-serif" font-size="16">8 Products &bull; Solidity ^0.8.24 &bull; EIP-4844 Ready &bull; Multi-Chain</text>

  <!-- Brand bar -->
  <rect x="0" y="610" width="1200" height="20" fill="url(#accent)"/>

  <!-- CryptoForge logo text -->
  <text x="600" y="500" text-anchor="middle" fill="#555566" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="4">CRYPTOFORGE</text>

  <!-- Decorative corners -->
  <path d="M 20 20 L 20 60 M 20 20 L 60 20" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 1180 20 L 1180 60 M 1180 20 L 1140 20" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 20 600 L 20 560 M 20 600 L 60 600" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 1180 600 L 1180 560 M 1180 600 L 1140 600" stroke="#FF6B00" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
